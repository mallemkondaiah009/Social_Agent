services:

  postgres:
    image: postgres:16-alpine
    container_name: social_agent_postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: social_agent
      POSTGRES_PASSWORD: social_agent
      POSTGRES_DB: social_agent_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U social_agent"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: social_agent_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata: